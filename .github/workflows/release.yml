name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão da release (ex: v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Versão inválida: '$VERSION'. Use o formato semver vX.Y.Z (ex: v1.2.0)."
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Run full test suite
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" testAll

      - name: Build fat JAR
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" -PreleaseVersion="$RELEASE_VERSION" shadowJar

      - name: Generate checksum
        run: |
          cd build/libs
          sha256sum "alpha7-library-manager-${RELEASE_VERSION}.jar" > "alpha7-library-manager-${RELEASE_VERSION}.jar.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/alpha7-library-manager-${{ env.RELEASE_VERSION }}.jar
            build/libs/alpha7-library-manager-${{ env.RELEASE_VERSION }}.jar.sha256
          generate_release_notes: true
          tag_name: ${{ env.VERSION }}
