name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile main, unit and integration test sources
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" compileJava compileTestJava compileIntegrationTestJava

  unit-tests:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" test

      - name: Upload unit test coverage data
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-unit
          path: build/jacoco/test.exec
          retention-days: 1

  integration-tests:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run integration tests
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" integrationTest

      - name: Upload integration test coverage data
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-integration
          path: build/jacoco/integrationTest.exec
          retention-days: 1

  coverage:
    needs: [ unit-tests, integration-tests ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download unit test coverage data
        uses: actions/download-artifact@v4
        with:
          name: jacoco-unit
          path: build/jacoco

      - name: Download integration test coverage data
        uses: actions/download-artifact@v4
        with:
          name: jacoco-integration
          path: build/jacoco

      - name: Merge coverage and verify threshold
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" jacocoTestReport jacocoTestCoverageVerification -x test -x integrationTest

      - name: Generate JaCoCo badge
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: build/reports/jacoco/test/jacocoTestReport.csv
          badges-directory: .github/badges
          generate-branch-badge: true
          on-missing-report: quiet

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: atualiza badge de cobertura"
          file_pattern: .github/badges/*.svg

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/
          retention-days: 7
