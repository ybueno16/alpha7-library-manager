services:
  db:
    image: postgres:15-alpine
    container_name: alpha7_library_db
    environment:
      POSTGRES_DB: library
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
